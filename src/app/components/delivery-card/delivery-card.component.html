<article class="delivery-card" [class.delivery-card--priority]="priority" (click)="cardPressed.emit()">
  <div class="delivery-card__topline">
    <div class="delivery-card__sequence" *ngIf="sequenceLabel">{{ sequenceLabel }}</div>
    <div class="delivery-card__priority" *ngIf="priority">Next Stop</div>
    <div class="delivery-card__slot" *ngIf="timeSlot">
      <ion-icon name="time-outline" aria-hidden="true"></ion-icon>
      <span>{{ timeSlot }}</span>
    </div>
  </div>

  <div class="delivery-card__chips">
    <app-status-chip [kind]="'schedule'" [value]="scheduleType"></app-status-chip>
    <app-status-chip [kind]="'status'" [value]="status"></app-status-chip>
  </div>

  <app-customer-info-card
    [name]="customerName"
    [customerCode]="customerCode"
    [address]="address"
    [landmark]="landmark"
    [routeLabel]="routeLabel"
  ></app-customer-info-card>

  <div class="delivery-card__summary" *ngIf="productSummary">
    <div class="delivery-card__summary-block">
      <span>Products</span>
      <strong>{{ productSummary }}</strong>
    </div>
    <div class="delivery-card__summary-block" *ngIf="deliveryStatusLabel">
      <span>Delivery Status</span>
      <strong>{{ deliveryStatusLabel }}</strong>
    </div>
    <div class="delivery-card__summary-block" *ngIf="orderStatusLabel">
      <span>Order Status</span>
      <strong>{{ orderStatusLabel }}</strong>
    </div>
  </div>

  <app-product-list
    [items]="items"
    [layout]="'compact'"
  ></app-product-list>

  <div class="delivery-card__footer">
    <ion-button class="delivery-card__action" fill="solid" (click)="actionPressed.emit(); $event.stopPropagation()">
      {{ actionText }}
      <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
    </ion-button>
  </div>
</article>

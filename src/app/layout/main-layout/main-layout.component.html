<div class="app-shell">
  <!-- All pages render here via Angular routing -->
  <ion-router-outlet class="app-outlet"></ion-router-outlet>

  <!-- Custom bottom tab bar — no IonTabs, plain HTML -->
  <nav class="app-tab-bar" role="tablist" aria-label="Main navigation">
    <button
      *ngFor="let tab of tabs"
      type="button"
      class="app-tab"
      [class.app-tab--active]="isActive(tab.path)"
      [attr.aria-selected]="isActive(tab.path)"
      role="tab"
      (click)="navigate(tab.path)"
    >
      <ion-icon [name]="tab.icon" aria-hidden="true"></ion-icon>
      <span class="app-tab__label">{{ tab.label }}</span>
    </button>
  </nav>
</div>

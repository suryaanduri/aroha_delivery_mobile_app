<ion-content [fullscreen]="true" [scrollY]="true">
  <div class="forgot-page">
    <div class="forgot-page__backdrop" aria-hidden="true"></div>
    <div class="forgot-page__glow forgot-page__glow--top" aria-hidden="true"></div>

    <main class="forgot-shell">
      <button class="forgot-back" type="button" (click)="goBack()" aria-label="Go back to login">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <span>Back to Login</span>
      </button>

      <section class="forgot-header" aria-label="Page header">
        <div class="forgot-header__icon">
          <ion-icon name="mail-outline"></ion-icon>
        </div>
        <h1>Forgot Password?</h1>
        <p>Enter your registered email address. We'll send a temporary password to your inbox.</p>
      </section>

      <section class="forgot-card" aria-label="Forgot password form">
        <form class="forgot-form" (ngSubmit)="onSubmit()">
          <label class="field">
            <span class="field__label">Email Address</span>
            <div class="field__control">
              <ion-icon name="mail-outline" aria-hidden="true"></ion-icon>
              <input
                type="email"
                name="email"
                inputmode="email"
                autocomplete="email"
                placeholder="Enter your email"
                [(ngModel)]="email"
                aria-label="Email"
              />
            </div>
          </label>

          <div *ngIf="errorMessage" class="forgot-form__error" role="alert">
            {{ errorMessage }}
          </div>

          <div *ngIf="successMessage" class="forgot-form__success" role="status">
            {{ successMessage }}
          </div>

          <ion-button
            class="forgot-form__submit"
            type="submit"
            expand="block"
            [disabled]="!canSubmit"
          >
            <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
            {{ loading ? 'Sending...' : 'Send Reset Password' }}
          </ion-button>
        </form>
      </section>
    </main>
  </div>
</ion-content>

<ion-content [fullscreen]="true" class="login-content">
  <div class="login-screen">
    <div class="login-screen__glow login-screen__glow--top" aria-hidden="true"></div>
    <div class="login-screen__glow login-screen__glow--bottom" aria-hidden="true"></div>
    <div class="login-screen__grain" aria-hidden="true"></div>

    <main class="login-shell">
      <section class="brand-hero" aria-label="Aroha Fresh branding">
        <div class="brand-hero__eyebrow">
          <span class="brand-hero__eyebrow-dot" aria-hidden="true"></span>
          Delivery partner access
        </div>

        <div class="brand-hero__header">
          <img
            class="brand-hero__logo"
            src="https://arohafresh.com/assets/WhatsApp%20Image%202025-09-02%20at%2012.38.22.jpeg"
            alt="Aroha Fresh logo"
          />

          <div class="brand-hero__copy">
            <p class="brand-hero__name">Aroha Fresh</p>
            <p class="brand-hero__tagline">Pure • Fresh • Natural</p>
          </div>
        </div>

        <div class="brand-hero__intro">
          <h1>Welcome back</h1>
          <p>Sign in to start today’s route, deliveries, and customer updates.</p>
        </div>
      </section>

      <section class="login-sheet" aria-label="Login form">
        <form class="login-form" (ngSubmit)="onSubmit()" novalidate>
          <div class="login-form__group">
            <label class="field-label" for="username">Username</label>

            <div class="field-shell" [class.field-shell--error]="!!usernameError">
              <ion-icon class="field-shell__icon" name="person-circle-outline" aria-hidden="true"></ion-icon>
              <input
                id="username"
                class="field-shell__input"
                type="text"
                name="username"
                inputmode="text"
                autocomplete="username"
                autocapitalize="none"
                autocorrect="off"
                spellcheck="false"
                enterkeyhint="next"
                placeholder="Enter username"
                [ngModel]="username"
                (ngModelChange)="onUsernameInput($event)"
                [attr.aria-invalid]="!!usernameError"
                [attr.aria-describedby]="usernameError ? 'username-error' : null"
              />
            </div>

            <p *ngIf="usernameError" id="username-error" class="field-message field-message--error">
              {{ usernameError }}
            </p>
          </div>

          <div class="login-form__group">
            <label class="field-label" for="password">Password</label>

            <div class="field-shell" [class.field-shell--error]="!!passwordError">
              <ion-icon class="field-shell__icon" name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <input
                id="password"
                class="field-shell__input"
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                autocomplete="current-password"
                autocapitalize="none"
                autocorrect="off"
                spellcheck="false"
                enterkeyhint="go"
                placeholder="Enter password"
                [ngModel]="password"
                (ngModelChange)="onPasswordInput($event)"
                [attr.aria-invalid]="!!passwordError"
                [attr.aria-describedby]="passwordError ? 'password-error' : null"
              />

              <button
                type="button"
                class="field-shell__toggle"
                (click)="togglePasswordVisibility()"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                [attr.aria-pressed]="showPassword"
              >
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" aria-hidden="true"></ion-icon>
              </button>
            </div>

            <p *ngIf="passwordError" id="password-error" class="field-message field-message--error">
              {{ passwordError }}
            </p>
          </div>

          <p *ngIf="errorMessage" class="login-alert" role="alert">
            {{ errorMessage }}
          </p>

          <div class="login-form__meta">
            <button type="button" class="login-form__link" (click)="goToForgotPassword()">
              Forgot password?
            </button>
          </div>

          <button type="submit" class="login-form__submit" [disabled]="!canSubmit" [attr.aria-busy]="loading">
            <ion-spinner *ngIf="loading" class="login-form__spinner" name="crescent"></ion-spinner>
            <span>{{ loading ? 'Signing in...' : 'Sign in' }}</span>
          </button>
        </form>
      </section>
    </main>
  </div>
</ion-content>

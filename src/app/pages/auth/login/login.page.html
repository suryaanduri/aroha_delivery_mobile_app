<ion-content [fullscreen]="true" [scrollY]="false">
  <div class="login-page">
    <div class="login-page__backdrop" aria-hidden="true"></div>
    <div class="login-page__glow login-page__glow--top" aria-hidden="true"></div>
    <div class="login-page__glow login-page__glow--bottom" aria-hidden="true"></div>

    <main class="login-shell">
      <section class="brand-panel" aria-label="App introduction">
        <div class="brand-mark">
          <img
            class="brand-mark__logo"
            src="https://arohafresh.com/assets/WhatsApp%20Image%202025-09-02%20at%2012.38.22.jpeg"
            alt="Aroha Fresh logo"
          />

          <div class="brand-mark__copy">
            <p class="brand-mark__title">
              <span>Aroha</span>
              <strong>Fresh</strong>
            </p>
            <span class="brand-mark__eyebrow">Pure • Fresh • Natural</span>
          </div>
        </div>

        <div class="brand-copy">
          <p class="brand-copy__kicker">Delivery Partner App</p>
        </div>
      </section>

      <section class="login-card" aria-label="Login form">
        <div class="login-card__header">
          <h2>Welcome back</h2>
          <p>Use your delivery credentials to continue securely.</p>
        </div>

        <form class="login-form" (ngSubmit)="onSubmit()">
          <label class="field">
            <span class="field__label">Username</span>
            <div class="field__control">
              <ion-icon name="person-circle-outline" aria-hidden="true"></ion-icon>
              <input
                type="text"
                name="username"
                inputmode="text"
                autocomplete="username"
                placeholder="Enter your username"
                [(ngModel)]="username"
                aria-label="Username"
              />
            </div>
          </label>

          <label class="field">
            <span class="field__label">Password</span>
            <div class="field__control">
              <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <input
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                [(ngModel)]="password"
                aria-label="Password"
              />
              <button
                type="button"
                class="field__toggle"
                (click)="togglePasswordVisibility()"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                [attr.aria-pressed]="showPassword"
              >
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </label>

          <div *ngIf="errorMessage" class="login-form__error" role="alert">
            {{ errorMessage }}
          </div>

          <div class="login-form__meta">
            <p class="login-form__hint">For registered delivery partners only.</p>
            <button type="button" class="login-form__link" (click)="goToForgotPassword()">Forgot password?</button>
          </div>

          <ion-button
            class="login-form__submit"
            type="submit"
            expand="block"
            [disabled]="!canSubmit"
          >
            <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
            {{ loading ? 'Signing in...' : 'Log In' }}
          </ion-button>
        </form>
      </section>
    </main>
  </div>
</ion-content>

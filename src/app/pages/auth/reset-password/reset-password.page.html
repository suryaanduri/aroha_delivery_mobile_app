<ion-content [fullscreen]="true" [scrollY]="true">
  <div class="reset-page">
    <div class="reset-page__backdrop" aria-hidden="true"></div>
    <div class="reset-page__glow reset-page__glow--top" aria-hidden="true"></div>

    <main class="reset-shell">
      <section class="reset-header" aria-label="Page header">
        <div class="reset-header__icon">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </div>
        <h1>Set New Password</h1>
        <p>Your account requires a password update before you can continue.</p>
      </section>

      <section class="reset-card" aria-label="Reset password form">
        <form class="reset-form" (ngSubmit)="onSubmit()">
          <label class="field">
            <span class="field__label">Old Password</span>
            <div class="field__control">
              <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <input
                [type]="showOld ? 'text' : 'password'"
                name="oldPassword"
                autocomplete="current-password"
                placeholder="Enter your current password"
                [(ngModel)]="oldPassword"
                aria-label="Old password"
              />
              <button
                type="button"
                class="field__toggle"
                (click)="showOld = !showOld"
                [attr.aria-label]="showOld ? 'Hide password' : 'Show password'"
              >
                <ion-icon [name]="showOld ? 'eye-off-outline' : 'eye-outline'" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </label>

          <label class="field">
            <span class="field__label">New Password</span>
            <div class="field__control">
              <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <input
                [type]="showNew ? 'text' : 'password'"
                name="newPassword"
                autocomplete="new-password"
                placeholder="Minimum 6 characters"
                [(ngModel)]="newPassword"
                aria-label="New password"
              />
              <button
                type="button"
                class="field__toggle"
                (click)="showNew = !showNew"
                [attr.aria-label]="showNew ? 'Hide password' : 'Show password'"
              >
                <ion-icon [name]="showNew ? 'eye-off-outline' : 'eye-outline'" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </label>

          <label class="field">
            <span class="field__label">Confirm Password</span>
            <div class="field__control">
              <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <input
                [type]="showConfirm ? 'text' : 'password'"
                name="confirmPassword"
                autocomplete="new-password"
                placeholder="Re-enter new password"
                [(ngModel)]="confirmPassword"
                aria-label="Confirm password"
              />
              <button
                type="button"
                class="field__toggle"
                (click)="showConfirm = !showConfirm"
                [attr.aria-label]="showConfirm ? 'Hide password' : 'Show password'"
              >
                <ion-icon [name]="showConfirm ? 'eye-off-outline' : 'eye-outline'" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </label>

          <div *ngIf="validationError" class="reset-form__warning" role="status">
            {{ validationError }}
          </div>

          <div *ngIf="errorMessage" class="reset-form__error" role="alert">
            {{ errorMessage }}
          </div>

          <div *ngIf="successMessage" class="reset-form__success" role="status">
            {{ successMessage }}
          </div>

          <ion-button
            class="reset-form__submit"
            type="submit"
            expand="block"
            [disabled]="!canSubmit"
          >
            <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
            {{ loading ? 'Updating...' : 'Update Password' }}
          </ion-button>
        </form>
      </section>
    </main>
  </div>
</ion-content>

<ion-content [fullscreen]="true">
  <app-page-shell>
      <app-top-header
        [eyebrow]="todayLabel"
        [title]="pageTitle"
        [subtitle]="pendingCount + ' Pending • ' + completedCount + ' Completed'"
        backRoute="/dashboard"
        backAriaLabel="Back to dashboard"
      >
        <ion-button header-end class="delivery-list-header__map" fill="solid" aria-label="Open route map" routerLink="/deliveries/map">
          <ion-icon name="location-outline"></ion-icon>
        </ion-button>
      </app-top-header>

      <!-- Loading state -->
      <app-surface-card *ngIf="loading" class="loading-state" aria-label="Loading" tone="muted">
        <ion-spinner name="crescent"></ion-spinner>
        <p>Loading deliveries...</p>
      </app-surface-card>

      <!-- Error state -->
      <app-surface-card *ngIf="!loading && errorMessage" class="error-state" aria-label="Error" tone="danger">
        <p>{{ errorMessage }}</p>
        <ion-button fill="outline" size="small" (click)="loadOrders()">
          <ion-icon slot="start" name="refresh-outline"></ion-icon>
          Retry
        </ion-button>
      </app-surface-card>

      <!-- Content (loaded) -->
      <ng-container *ngIf="!loading && !errorMessage">
        <app-surface-card class="summary-strip" aria-label="Delivery summary" tone="muted" [compact]="true">
          <article class="summary-pill">
            <span>Total</span>
            <strong>{{ totalStops }}</strong>
          </article>
          <article class="summary-pill">
            <span>Pending</span>
            <strong>{{ pendingCount }}</strong>
          </article>
          <article class="summary-pill summary-pill--accent">
            <span>Completed</span>
            <strong>{{ completedCount }}</strong>
          </article>
        </app-surface-card>

        <app-surface-card class="search-panel" aria-label="Search and filters" [compact]="true">
          <label class="search-field">
            <ion-icon name="search-outline" aria-hidden="true"></ion-icon>
            <input
              type="search"
              name="searchTerm"
              placeholder="Search customer, code, or address"
              [(ngModel)]="searchTerm"
              aria-label="Search deliveries"
            />
            <button *ngIf="searchTerm" class="search-field__clear" type="button" (click)="clearSearch()" aria-label="Clear search">
              <ion-icon name="close-circle-outline" aria-hidden="true"></ion-icon>
            </button>
            <button class="search-field__filter" type="button" aria-label="Open filters">
              <ion-icon name="funnel-outline" aria-hidden="true"></ion-icon>
              <span *ngIf="activeFilterCount" class="search-field__filter-count">{{ activeFilterCount }}</span>
            </button>
          </label>

          <div class="filter-rail">
            <button
              *ngFor="let filter of filterOptions"
              type="button"
              class="filter-chip"
              [class.filter-chip--active]="selectedFilter === filter.key"
              (click)="selectFilter(filter.key)"
            >
              {{ filter.label }}
            </button>
          </div>
        </app-surface-card>

        <ng-container *ngIf="filteredDeliveries.length; else emptyResult">
          <section *ngIf="nextStop" class="list-section">
            <app-section-header
              title="Next Stop"
              [meta]="nextStop.sequenceLabel"
            ></app-section-header>

            <app-delivery-card
              [stop]="nextStop"
              [priority]="true"
              actionText="Open Stop"
              (cardPressed)="openDelivery(nextStop.id)"
              (actionPressed)="openDelivery(nextStop.id)"
            ></app-delivery-card>
          </section>

          <section *ngIf="remainingActiveStops.length" class="list-section">
            <app-section-header
              title="Active Stops"
              [meta]="remainingActiveStops.length + ' stops'"
            ></app-section-header>

            <div class="delivery-list-stack">
              <app-delivery-card
                [stop]="stop"
                *ngFor="let stop of remainingActiveStops"
                actionText="Open Stop"
                (cardPressed)="openDelivery(stop.id)"
                (actionPressed)="openDelivery(stop.id)"
              ></app-delivery-card>
            </div>
          </section>

          <section *ngIf="completedStops.length" class="list-section">
            <app-section-header
              title="Completed"
              [meta]="completedStops.length + ' done'"
            ></app-section-header>

            <div class="delivery-list-stack delivery-list-stack--completed">
              <app-delivery-card
                [stop]="stop"
                *ngFor="let stop of completedStops"
                actionText="View Stop"
                (cardPressed)="openDelivery(stop.id)"
                (actionPressed)="openDelivery(stop.id)"
              ></app-delivery-card>
            </div>
          </section>
        </ng-container>

        <ng-template #emptyResult>
          <app-empty-state
            icon="search-outline"
            title="No deliveries found"
            message="Try adjusting search or filter selections to find the right stop."
            actionText="Show All"
            (actionPressed)="searchTerm = ''; selectFilter('all')"
          ></app-empty-state>
        </ng-template>
      </ng-container>
  </app-page-shell>
</ion-content>
